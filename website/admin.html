<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Kopi Kenangan</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        min-height: 100vh;
      }

      .admin-shell {
        padding: 3rem 0 4rem;
        display: grid;
        gap: 1.5rem;
      }

      .admin-card {
        padding: 2rem;
      }

      .admin-actions {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        margin-top: 1rem;
      }

      .status-pill {
        display: inline-block;
        padding: 0.45rem 0.75rem;
        border-radius: 999px;
        background: rgba(212, 175, 55, 0.15);
        color: var(--primary-dark);
        font-size: 0.95rem;
        font-weight: 700;
      }

      .notice {
        margin-top: 1rem;
        padding: 0.9rem 1rem;
        border-radius: 12px;
        background: #fdf2dc;
        color: var(--primary-dark);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-bar">
        <a class="brand" href="index.html" aria-label="Kopi Kenangan Home">
          <img class="brand-logo" src="assets/logo.svg" alt="Logo Kopi Kenangan" />
          <span>Kopi Kenangan</span>
        </a>
        <nav class="site-nav" aria-label="Navigasi admin">
          <a href="index.html">Lihat Website</a>
          <a href="admin.html">Admin</a>
        </nav>
      </div>
    </header>

    <main class="container admin-shell">
      <section id="login-panel" class="card admin-card">
        <p class="eyebrow">Akses Admin</p>
        <h1>Panel admin Kopi Kenangan</h1>
        <p>Masuk sebagai admin untuk mengubah konten utama website.</p>
        <form id="admin-login-form">
          <label>
            Username
            <input type="text" id="admin-username" value="admin" required />
          </label>
          <label>
            Password
            <input type="password" id="admin-password" value="kopi123" required />
          </label>
          <button class="btn btn-primary" type="submit">Masuk</button>
        </form>
      </section>

      <section id="dashboard-panel" class="card admin-card" hidden>
        <div class="admin-actions">
          <span class="status-pill">Anda masuk sebagai admin</span>
          <button class="btn btn-secondary" id="logout-btn" type="button">Keluar</button>
        </div>

        <h2>Kelola konten website</h2>
        <p>Perubahan yang Anda simpan akan langsung diterapkan ke halaman utama.</p>

        <form id="site-settings-form">
          <label>
            Judul hero
            <input type="text" id="hero-title-input" />
          </label>
          <label>
            Deskripsi hero
            <textarea id="hero-description-input" rows="3"></textarea>
          </label>
          <label>
            Judul tentang kami
            <input type="text" id="about-title-input" />
          </label>
          <label>
            Isi tentang kami
            <textarea id="about-description-input" rows="4"></textarea>
          </label>
          <div class="admin-actions">
            <button class="btn btn-primary" type="submit">Simpan perubahan</button>
            <button class="btn btn-secondary" type="button" id="reset-btn">Reset default</button>
          </div>
        </form>
        <div id="admin-notice" class="notice" hidden></div>
      </section>
    </main>

    <script>
      const loginPanel = document.getElementById('login-panel');
      const dashboardPanel = document.getElementById('dashboard-panel');
      const loginForm = document.getElementById('admin-login-form');
      const settingsForm = document.getElementById('site-settings-form');
      const notice = document.getElementById('admin-notice');
      const logoutBtn = document.getElementById('logout-btn');
      const resetBtn = document.getElementById('reset-btn');

      const defaultSettings = {
        heroTitle: 'Rasakan kopi premium, promo menarik, dan kenyamanan order online dalam satu sentuhan.',
        heroDescription: 'Nikmati pengalaman minum kopi yang modern, cepat, dan penuh kenangan dengan menu favorit, outlet terdekat, dan rewards eksklusif.',
        aboutTitle: 'Brand kopi modern yang dekat di hati pelanggan.',
        aboutDescription: 'Kopi Kenangan hadir untuk membawa pengalaman minum kopi yang modern, premium, dan ramah untuk setiap momen.'
      };

      function getStoredSettings() {
        try {
          return { ...defaultSettings, ...JSON.parse(localStorage.getItem('kopiKenanganSiteSettings') || '{}') };
        } catch {
          return { ...defaultSettings };
        }
      }

      function showNotice(message) {
        notice.hidden = false;
        notice.textContent = message;
      }

      function showDashboard() {
        loginPanel.hidden = true;
        dashboardPanel.hidden = false;
        fillForm();
      }

      function showLogin() {
        loginPanel.hidden = false;
        dashboardPanel.hidden = true;
      }

      function fillForm() {
        const settings = getStoredSettings();
        document.getElementById('hero-title-input').value = settings.heroTitle;
        document.getElementById('hero-description-input').value = settings.heroDescription;
        document.getElementById('about-title-input').value = settings.aboutTitle;
        document.getElementById('about-description-input').value = settings.aboutDescription;
      }

      loginForm.addEventListener('submit', (event) => {
        event.preventDefault();
        const username = document.getElementById('admin-username').value.trim();
        const password = document.getElementById('admin-password').value;

        if (username === 'admin' && password === 'kopi123') {
          sessionStorage.setItem('kopiKenanganAdmin', 'true');
          showDashboard();
          showNotice('Login berhasil. Anda sekarang menjadi admin.');
        } else {
          showNotice('Username atau password salah.');
        }
      });

      settingsForm.addEventListener('submit', (event) => {
        event.preventDefault();
        const settings = {
          heroTitle: document.getElementById('hero-title-input').value.trim(),
          heroDescription: document.getElementById('hero-description-input').value.trim(),
          aboutTitle: document.getElementById('about-title-input').value.trim(),
          aboutDescription: document.getElementById('about-description-input').value.trim()
        };

        localStorage.setItem('kopiKenanganSiteSettings', JSON.stringify(settings));
        showNotice('Perubahan berhasil disimpan.');
        window.dispatchEvent(new Event('storage'));
      });

      resetBtn.addEventListener('click', () => {
        localStorage.removeItem('kopiKenanganSiteSettings');
        fillForm();
        showNotice('Konten dikembalikan ke default.');
        window.dispatchEvent(new Event('storage'));
      });

      logoutBtn.addEventListener('click', () => {
        sessionStorage.removeItem('kopiKenanganAdmin');
        showLogin();
        notice.hidden = true;
      });

      if (sessionStorage.getItem('kopiKenanganAdmin') === 'true') {
        showDashboard();
      }

      window.addEventListener('storage', () => {
        if (sessionStorage.getItem('kopiKenanganAdmin') === 'true') {
          showDashboard();
        }
      });
    </script>
  </body>
</html>
