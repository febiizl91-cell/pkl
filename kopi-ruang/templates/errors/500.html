<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>500 - Server Error</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
    <style>
      .error-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #fdf7ee 0%, #fff8f0 100%);
        padding: 2rem;
      }
      
      .error-container {
        text-align: center;
        max-width: 600px;
      }
      
      .error-code {
        font-size: 8rem;
        font-weight: 800;
        color: #8b6f47;
        line-height: 1;
        margin: 0;
      }
      
      .error-title {
        font-size: 2rem;
        color: #374151;
        margin: 1rem 0;
      }
      
      .error-message {
        color: #6b7280;
        margin-bottom: 2rem;
        line-height: 1.6;
      }
      
      .error-actions {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <div class="error-page">
      <div class="error-container">
        <p class="error-code">500</p>
        <h1 class="error-title">Server Error</h1>
        <p class="error-message">Terjadi kesalahan pada server kami. Tim teknis kami sedang menangani masalah ini. Silakan coba lagi nanti.</p>
        <div class="error-actions">
          <a href="{{ url_for('index') }}" class="btn btn-primary">Kembali ke Home</a>
          <a href="{{ url_for('contact') }}" class="btn btn-secondary">Hubungi Kami</a>
        </div>
      </div>
    </div>
  </body>
</html>
