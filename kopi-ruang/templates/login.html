{% extends 'base.html' %}

{% block title %}Login | Kopi Ruang{% endblock %}

{% block content %}
<section class="section auth-section">
  <div class="container auth-card">
    <p class="eyebrow">Login</p>
    <h2>Masuk ke akun Kopi Ruang</h2>
    <form method="post">
      {{ form.hidden_tag() }}
      <label>{{ form.email.label }}{{ form.email(class='input-field') }}</label>
      <label>{{ form.password.label }}{{ form.password(class='input-field') }}</label>
      <label class="checkbox-field">{{ form.remember() }} {{ form.remember.label }}</label>
      <button class="btn btn-primary" type="submit">Masuk</button>
    </form>
    <p>Belum punya akun? <a href="{{ url_for('register') }}">Daftar di sini</a>.</p>
  </div>
</section>
{% endblock %}
