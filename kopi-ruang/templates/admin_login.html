{% extends 'base.html' %}

{% block title %}Admin Login | Kopi Ruang{% endblock %}

{% block content %}
<section class="section auth-section">
  <div class="container auth-card">
    <p class="eyebrow">Admin</p>
    <h2>Masuk ke dashboard admin</h2>
    <form method="post">
      <label>Username<input class="input-field" type="text" name="username" required /></label>
      <label>Password<input class="input-field" type="password" name="password" required /></label>
      <button class="btn btn-primary" type="submit">Masuk</button>
    </form>
  </div>
</section>
{% endblock %}
